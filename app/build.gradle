
plugin {
  id 'com.android.application'
  id 'kotlin-android'
}

android {
  compileSDK 34

  defaultConfig {
    applicationid "com.example.kernvar"
    minSdk 21
    targetSdk 34
    versionCode 1
    versionName "1.0"

    testinstrumentationRunner "android.test.runner.AndroidJUnitRunner"
  }

  buildTypes {
      release {
          minifyEnable false
          proguardFiles getDefaultProguardFile('proguard-android-optimaze.txt') 'proguard-rules.pro'
      }
  }
}

dependencies {
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  implementation 'androidx.core:core-ktx:1.8.0'
  implementation 'androidx.appcompat:appcompat:1.5.1'
  implementation 'com.googlee.android.material:material:1.6.1'
  implementation 'androoidx.constrainlayout:constrainlayout:2.1.4'
  testimplementation 'junit:junit:4.13.2'
  androidTestimplementation 'androidx.test.ext:junit:1.1.3'
  androidTestimplementation 'androidx.test.espresso:espresso-core:3.4.0'
}
